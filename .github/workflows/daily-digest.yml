name: Daily Digest

on:
  schedule:
    - cron: '0 23 * * *'   # 08:00 KST
    - cron: '0 5 * * *'    # 14:00 KST
    - cron: '0 11 * * *'   # 20:00 KST
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests deep-translator

      - name: Generate China digest
        run: python3 generate.py

      - name: Generate DPRK digest
        run: python3 generate_dprk.py

      - name: Generate Russia digest
        run: python3 generate_russia.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "digest: $(date +'%Y-%m-%d-%H%M' -d '+9 hours')"
          git push
